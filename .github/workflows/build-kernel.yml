name: Build Kernel (Check Daily for New Versions)

# Runs daily to detect new upstream kernel versions. When a new version is found
# the pipeline builds Armbian kernel packages and publishes them to the APT
# repository hosted on GitHub Pages.
#
# Pipeline overview:
#   1. check-kernel-version  — compare kernel.org against the published APT repo
#   2. build-kernel          — build .deb packages inside the Armbian container
#   3. publish-apt-repo      — update the gh-pages APT repo (keeps 2 latest kernels)

on:
  schedule:
    # Check for a new kernel every day at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build even if no new version found (true/false)'
        required: false
        default: 'false'
      kernel_branch:
        description: 'Armbian kernel branch (current, edge)'
        required: false
        default: 'edge'

env:
  BOARD: turing-rk1
  KERNEL_BRANCH: ${{ github.event.inputs.kernel_branch || 'edge' }}
  # URL where GitHub Pages serves the gh-pages branch of this repository
  PAGES_URL: https://${{ github.repository_owner }}.github.io/turing-pi_rk1

permissions: {}

jobs:

  # ---------------------------------------------------------------------------
  # Job 1 — Check whether a new kernel version is available
  # ---------------------------------------------------------------------------
  check-kernel-version:
    name: Check for New Kernel Version
    runs-on: self-hosted
    permissions:
      contents: read
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      kernel_version: ${{ steps.check.outputs.kernel_version }}

    steps:
      - name: Compare kernel.org against last published version
        id: check
        run: |
          # Fetch the list of current releases from kernel.org
          KERNEL_JSON=$(curl -fsSL https://www.kernel.org/releases.json)

          # Pick the latest stable release, falling back to longterm if needed
          LATEST_VERSION=$(echo "$KERNEL_JSON" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          releases = data.get('releases', [])
          for moniker in ('stable', 'longterm'):
              candidates = [r for r in releases if r.get('moniker') == moniker]
              if candidates:
                  print(candidates[0]['version'])
                  break
          ")

          if [ -z "$LATEST_VERSION" ]; then
            echo "ERROR: Could not determine latest kernel version from kernel.org"
            exit 1
          fi

          echo "Latest upstream kernel : $LATEST_VERSION"
          echo "kernel_version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"

          # Read the version that was last published to the APT repo.
          # latest-kernel.txt is written by publish-apt-repo and served via GitHub Pages.
          # Falls back to "none" on the very first run before anything has been published.
          LAST_BUILT=$(curl -fsSL "${{ env.PAGES_URL }}/latest-kernel.txt" 2>/dev/null \
            | tr -d '[:space:]' || echo "none")

          echo "Last published kernel  : $LAST_BUILT"

          if [ "${{ github.event.inputs.force_build }}" = "true" ]; then
            echo "Force-build requested."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          elif [ "$LATEST_VERSION" != "$LAST_BUILT" ]; then
            echo "New version found — scheduling build."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "Already up to date — skipping build."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # Job 2 — Build kernel .deb packages
  # ---------------------------------------------------------------------------
  build-kernel:
    name: Build Kernel Packages
    needs: check-kernel-version
    if: needs.check-kernel-version.outputs.should_build == 'true'
    runs-on: self-hosted
    # Run inside the official Armbian build container.
    # compile.sh detects the Docker environment (/.dockerenv) and builds natively
    # without spawning a nested container, so no 'docker' subcommand is needed.
    container:
      image: ghcr.io/armbian/docker-armbian-build:armbian-ubuntu-jammy-latest
      options: --privileged
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone Armbian build system
        run: |
          git clone --depth=1 https://github.com/armbian/build.git armbian-build
          echo "Armbian commit: $(git -C armbian-build rev-parse HEAD)"

      - name: Copy userpatches into Armbian build tree
        run: cp -r userpatches armbian-build/

      - name: Build kernel packages
        run: |
          cd armbian-build
          ./compile.sh kernel \
            BOARD="${{ env.BOARD }}" \
            BRANCH="${{ env.KERNEL_BRANCH }}" \
            KERNEL_CONFIGURE="no"

      - name: List produced .deb packages
        run: find armbian-build/output/debs -name "*.deb" | sort || echo "(none found)"

      - name: Upload kernel packages as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-debs-${{ github.run_number }}
          path: armbian-build/output/debs/*.deb
          # Short retention — the APT repo on gh-pages is the permanent store
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 3 — Publish packages to the APT repository on GitHub Pages
  # ---------------------------------------------------------------------------
  publish-apt-repo:
    name: Publish APT Repository
    needs: [check-kernel-version, build-kernel]
    runs-on: self-hosted
    # Run inside a standard Ubuntu container so that dpkg-dev and git are
    # available without requiring those tools to be pre-installed on the runner.
    container:
      image: ubuntu:22.04
      options: --user root
    permissions:
      contents: write

    steps:
      - name: Install required tools
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            ca-certificates curl dpkg-dev git gzip

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download new kernel .deb packages
        uses: actions/download-artifact@v4
        with:
          name: kernel-debs-${{ github.run_number }}
          path: new-debs

      - name: Check out (or create) the gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages:refs/remotes/origin/gh-pages 2>/dev/null || true

          if git ls-remote --heads origin gh-pages | grep -q gh-pages; then
            git worktree add apt-repo origin/gh-pages
          else
            # First run: create an orphan branch with no history
            git worktree add --detach apt-repo
            cd apt-repo
            git checkout --orphan gh-pages
            git reset --hard
            git clean -fdx
            cd ..
          fi

      - name: Update APT pool and regenerate metadata
        env:
          KERNEL_VERSION: ${{ needs.check-kernel-version.outputs.kernel_version }}
          MAX_KERNELS: "2"
        run: |
          set -euo pipefail

          POOL_DIR="apt-repo/pool/main"
          BINARY_DIR="apt-repo/dists/bookworm/main/binary-arm64"
          mkdir -p "$POOL_DIR" "$BINARY_DIR"

          # Add the newly built packages to the pool
          cp new-debs/*.deb "$POOL_DIR/"
          echo "Pool contents:"
          ls -lh "$POOL_DIR/"

          # Keep only the MAX_KERNELS most recent kernel versions.
          # Versions are extracted from filenames: linux-image-*_<version>_arm64.deb
          VERSIONS=$(ls "$POOL_DIR"/linux-image-*.deb 2>/dev/null \
            | sed -n 's/.*_\([0-9][^_]*\)_arm64\.deb$/\1/p' \
            | sort -V | uniq)

          VERSION_COUNT=$(printf '%s\n' "$VERSIONS" | grep -c . || true)
          echo "Versions in pool ($VERSION_COUNT): $VERSIONS"

          if [ "$VERSION_COUNT" -gt "$MAX_KERNELS" ]; then
            TO_REMOVE=$(printf '%s\n' "$VERSIONS" | head -n $((VERSION_COUNT - MAX_KERNELS)))
            echo "Pruning old versions: $TO_REMOVE"
            for OLD_VER in $TO_REMOVE; do
              find "$POOL_DIR" -name "*_${OLD_VER}_arm64.deb" -delete -print
            done
          fi

          # Regenerate the Packages index and its compressed copy
          (cd apt-repo && dpkg-scanpackages pool/main \
            > dists/bookworm/main/binary-arm64/Packages 2>/dev/null)
          gzip -k -f "$BINARY_DIR/Packages"

          # Build the Release file with MD5 and SHA256 checksums
          DATE=$(date -Ru)
          {
            echo "Origin: Turing Pi RK1 Armbian Kernel"
            echo "Label: Turing Pi RK1 Armbian Kernel"
            echo "Suite: bookworm"
            echo "Codename: bookworm"
            echo "Architectures: arm64"
            echo "Components: main"
            echo "Description: Armbian kernel packages for Turing Pi RK1 (Rockchip RK3588S)"
            echo "Date: $DATE"
            echo "MD5Sum:"
            for f in "$BINARY_DIR/Packages" "$BINARY_DIR/Packages.gz"; do
              printf " %s %s %s\n" \
                "$(md5sum    "$f" | cut -d' ' -f1)" \
                "$(wc -c < "$f")" \
                "${f#apt-repo/dists/bookworm/}"
            done
            echo "SHA256:"
            for f in "$BINARY_DIR/Packages" "$BINARY_DIR/Packages.gz"; do
              printf " %s %s %s\n" \
                "$(sha256sum "$f" | cut -d' ' -f1)" \
                "$(wc -c < "$f")" \
                "${f#apt-repo/dists/bookworm/}"
            done
          } > "apt-repo/dists/bookworm/Release"

          # Track which kernel version is currently published.
          # check-kernel-version reads this file on subsequent runs to detect new versions.
          echo "$KERNEL_VERSION" > apt-repo/latest-kernel.txt

          # Landing page for humans visiting the GitHub Pages URL
          PAGES_URL="${{ env.PAGES_URL }}"
          cat > apt-repo/index.html << HTMLEOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Turing Pi RK1 — Armbian Kernel APT Repository</title>
            <style>
              body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
              pre  { background: #f4f4f4; padding: 1rem; border-radius: 4px; overflow-x: auto; }
              code { background: #f4f4f4; padding: 0.2em 0.4em; border-radius: 3px; }
            </style>
          </head>
          <body>
            <h1>Turing Pi RK1 — Armbian Kernel APT Repository</h1>
            <p>
              Automatically updated APT repository for Armbian kernel packages targeting the
              <a href="https://turingpi.com/product/turing-rk1/">Turing Pi RK1</a>
              (Rockchip RK3588S). The two most recent kernel versions are always available.
            </p>

            <h2>Add this repository</h2>
            <pre>echo "deb [trusted=yes] ${PAGES_URL} bookworm main" | sudo tee /etc/apt/sources.list.d/turing-rk1-kernel.list
          sudo apt update</pre>

            <h2>Install the kernel</h2>
            <pre>sudo apt install linux-image-edge-rockchip64 linux-dtb-edge-rockchip64 linux-headers-edge-rockchip64
          sudo reboot</pre>

            <h2>Status</h2>
            <ul>
              <li><strong>Latest version:</strong> <code>${KERNEL_VERSION}</code></li>
              <li><strong>Last updated:</strong> ${DATE}</li>
            </ul>

            <h2>Source</h2>
            <p>
              Build scripts and userpatches:
              <a href="https://github.com/${{ github.repository }}">github.com/${{ github.repository }}</a>
            </p>
          </body>
          </html>
          HTMLEOF

      - name: Commit and push to gh-pages
        env:
          KERNEL_VERSION: ${{ needs.check-kernel-version.outputs.kernel_version }}
        run: |
          cd apt-repo
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing changed — skipping commit."
          else
            git commit -m "kernel ${KERNEL_VERSION}: update APT repo, keep 2 latest"
            git push origin HEAD:gh-pages
          fi
