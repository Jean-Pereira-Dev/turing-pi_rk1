name: Build Armbian Image (Monthly)

# Builds a complete Armbian OS image for the Turing Pi RK1 module once a month
# (or on demand). The image is published as a GitHub Release.
#
# The job runs inside the official Armbian build container so that all build
# dependencies are self-contained and the runner host stays clean.

on:
  schedule:
    # 02:00 UTC on the 1st of every month
    - cron: '0 2 1 * *'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Kernel branch (current, edge, vendor)'
        required: false
        default: 'current'
      release:
        description: 'Armbian OS release (e.g., noble, jammy)'
        required: false
        default: 'noble'
      build_minimal:
        description: 'Build minimal image (yes/no)'
        required: false
        default: 'no'

env:
  BOARD: turing-rk1
  BRANCH: ${{ github.event.inputs.branch || 'current' }}
  RELEASE: ${{ github.event.inputs.release || 'noble' }}
  BUILD_MINIMAL: ${{ github.event.inputs.build_minimal || 'no' }}

permissions: {}

jobs:
  build-image:
    name: Build Armbian Image for Turing Pi RK1
    runs-on: self-hosted
    # Run the entire job inside the official Armbian build container.
    # compile.sh detects the Docker environment (/.dockerenv) and builds natively
    # without spawning a nested container, so no 'docker' subcommand is needed.
    container:
      image: ghcr.io/armbian/docker-armbian-build:armbian-ubuntu-jammy-latest
      options: --privileged
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone Armbian build system
        run: |
          git clone --depth=1 https://github.com/armbian/build.git armbian-build
          echo "Armbian commit: $(git -C armbian-build rev-parse HEAD)"

      - name: Copy userpatches into Armbian build tree
        run: |
          cp -r userpatches armbian-build/
          find armbian-build/userpatches -type f | sort

      - name: Build Armbian image
        run: |
          cd armbian-build
          ./compile.sh \
            BOARD="${{ env.BOARD }}" \
            BRANCH="${{ env.BRANCH }}" \
            RELEASE="${{ env.RELEASE }}" \
            BUILD_MINIMAL="${{ env.BUILD_MINIMAL }}" \
            BUILD_DESKTOP="no" \
            KERNEL_CONFIGURE="no" \
            COMPRESS_OUTPUTIMAGE="sha,xz" \
            DEST_LANG="en_US.UTF-8"

      - name: List build output
        run: |
          ls -lh armbian-build/output/images/ || echo "(no images)"
          ls -lh armbian-build/output/debs/   || echo "(no debs)"

      - name: Upload image as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: armbian-${{ env.BOARD }}-${{ env.RELEASE }}-${{ env.BRANCH }}-${{ github.run_number }}
          path: |
            armbian-build/output/images/*.img.xz
            armbian-build/output/images/*.img.xz.sha
          retention-days: 30

      - name: Determine monthly release tag
        id: tag
        run: |
          TAG="image-$(date +%Y-%m)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create or update monthly GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Armbian Image for Turing Pi RK1 — ${{ steps.tag.outputs.tag }}
          body: |
            ## Armbian Image for Turing Pi RK1

            | Field | Value |
            |-------|-------|
            | Board | `${{ env.BOARD }}` |
            | OS Release | `${{ env.RELEASE }}` |
            | Kernel Branch | `${{ env.BRANCH }}` |
            | Build Date | ${{ github.run_started_at }} |
            | Workflow Run | [${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

            ## Installation

            1. Flash the `.img.xz` file to an eMMC or SD card using [balenaEtcher](https://etcher.io) or `dd`.
            2. Insert into the Turing Pi RK1 module and power on.

            ```bash
            sha256sum -c *.img.xz.sha
            ```
          files: |
            armbian-build/output/images/*.img.xz
            armbian-build/output/images/*.img.xz.sha
          draft: false
          prerelease: false
          make_latest: true
